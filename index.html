<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reload</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .content {
            text-align: center;
        }
        h1 {
            font-size: 36px; /* Increased font size */
            font-weight: bold; /* Bold font weight */
            color: #090101;
        }
        h2 {
            font-size: 24px; /* Increased font size */
            color: #333333;
        }
        p {
            font-size: 18px; /* Increased font size */
            color: #666666;
            font-weight: bold;
        }
        button {
            padding: 10px 20px;
            font-size: 18px; /* Increased font size */
            font-weight: bold; /* Bold font weight */
            ;
            color: #090000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>Error</h1>
        <p>404</p>
        <h2>Sorry, the page you are looking for cannot be found.</h2>
        <a href="" target="_blank"><button>Reload</button></a>
    </div>
</body>
</html>
